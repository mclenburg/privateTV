server:
  host: "127.0.0.1"
  port: 9988
  public_base_url: "http://127.0.0.1:9988"

channel:
  id: "privatetv"
  name: "PrivateTV"
  # Leave empty to use the built-in PrivateTV logo served by the PrivateTV HTTP service.
  # Leave empty to use the built-in Hazard TV logo served by the PrivateTV HTTP service.
  icon: ""
  group_title: "Local"
  language: "de"

# Optional random channel. Hazard TV has no XMLTV schedule. Each request starts
# with a random movie from the beginning; following movies are selected randomly
# as long as the client keeps watching. It shares the global stream limit with
# the main channel.
hazard_channel:
  enabled: false
  id: "hazardtv"
  name: "Hazard TV"
  icon: ""
  group_title: "Local"
  language: "de"
  random_seed: 20260704
  avoid_immediate_repeat: true

media:
  directories:
    - "tests/fixtures/media"
  # Optional YAML tag rules. Use /etc/privatetv/tags.yml in production.
  tag_file: ""
  recursive: true
  follow_symlinks: false
  ignore_hidden_directories: true
  extensions:
    - ".avi"
    - ".mpg"
    - ".mpeg"
    - ".mp4"
    - ".mkv"
    - ".ts"
    - ".vob"
  dvd:
    enabled: true
    detect_video_ts: true
    main_title_strategy: "largest_titleset"
    min_main_title_size_mb: 0
    min_main_title_duration_seconds: 1
  series_detection:
    enabled: true
    # Built-in patterns detect common names such as S01E02, 1x02, Staffel 1/Folge 02.
    auto_patterns: true
    # Custom patterns are matched relative to each media directory and without file extension.
    # Example: /data/Serien/ALF/1/03_Katzenjammer.mkv -> ALF S01E03
    custom_patterns:
      - name: "Serienname Staffelnummer Folgennummer"
        pattern: "{seriesName}/{seasonNo}/{episodeNo}_*"

schedule:
  # XMLTV should always extend at least this far into the future.
  # PrivateTV rebuilds up to days_ahead whenever the stored timeline falls below this threshold.
  minimum_days_ahead: 3
  days_ahead: 5
  timezone: "Europe/Berlin"
  rebuild_hour: 3
  strategy: "shuffle_no_repeat"
  random_seed: 20260704

# Optional broadcast automation mode.
# Disabled by default: when program_blocks.enabled is false, PrivateTV keeps the current
# continuous legacy scheduler and does not require filler clips.
# Patch 19 adds an optional generated countdown before enabled anchors when the gap is <= 60s.
program_blocks:
  enabled: false
  anchors:
    - enabled: false
      time: "20:15"
      title: "Der 20:15 Film"
      allowed_tags:
        - "movie"
      denied_tags:
        - "filler"
      tag_match: "any"
  blocks:
    - enabled: false
      start: "06:00"
      duration: "02:30:00"
      title: "PrivateTV Kinderzeit"
      allowed_tags:
        - "kids"
      denied_tags:
        - "nicht_fuer_kinder"
      tag_match: "any"
      # continue_current_mode keeps the legacy rotation if no matching material exists.
      if_empty: "continue_current_mode"
      # normal = ordinary tag-based block. series_rotation = play detected episodes in SxxEyy order.
      mode: "normal"
      series:
        enabled: false
        selection: "continue_current_series"
        # restart | next_series | stop_block
        on_series_end: "restart"
        max_episode_duration_seconds: 3600
        remember_position: true
    - enabled: false
      start: "18:05"
      duration: "00:45:00"
      title: "Vorabendserie"
      allowed_tags:
        - "vorabendserie"
      denied_tags:
        - "filler"
      tag_match: "any"
      if_empty: "skip_block"
      mode: "series_rotation"
      series:
        enabled: true
        selection: "continue_current_series"
        on_series_end: "next_series"
        max_episode_duration_seconds: 3600
        remember_position: true
  fillers:
    enabled: false
    directories: []
    # Filler clips are scanned as short local clips.
    # distribution: anchor_bridge keeps patch-20 behavior; between_programmes spreads short ad/bumpers between films.
    distribution: "anchor_bridge"
    insert_between_movies: false
    allowed_tags:
      - "filler"
    denied_tags:
      - "movie"
    max_duration_seconds: 900
    max_consecutive_fillers: 3
    max_total_filler_block_seconds: 120
    prefer_filler_after_minutes: 45
    min_gap_between_filler_blocks_minutes: 20
    # continue_current_mode preserves the existing film-after-film behavior when no filler is available.
    if_no_filler: "continue_current_mode"
  generated_countdown:
    enabled: false
    # Hard limit: generated countdowns must never be longer than 60 seconds.
    max_duration_seconds: 60
    title: "Gleich geht's weiter"

  generated_promos:
    enabled: false
    duration_min_seconds: 15
    duration_max_seconds: 30
    lookahead_hours: 72
    min_gap_minutes: 20
    max_per_hour: 2
    next_up:
      enabled: false
      title_template: "Als nächstes"
      include_air_time: false
    coming_soon:
      enabled: false
      title_template: "Coming soon"
      include_air_time: true
    promotable:
      min_duration_seconds: 300
      denied_tags:
        - "filler"
        - "commercial"
        - "bumper"
        - "trailer"
        - "countdown"
        - "promo"

streaming:
  max_parallel_streams: 4
  output_container: "mpegts"
  prefer_stream_copy: true
  transcode_when_needed: false
  ffmpeg_path: "/usr/bin/ffmpeg"
  ffprobe_path: "/usr/bin/ffprobe"
  accepted_seek_tolerance_seconds: 10

# For development this stays inside the repository working tree.
# Production path should be /var/lib/privatetv/privatetv.sqlite3.
database:
  path: "var/lib/privatetv/privatetv.sqlite3"

logging:
  level: "INFO"
